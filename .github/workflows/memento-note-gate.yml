name: memento-note-gate

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  enforce-memento-notes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install git-memento
        uses: ./install
        with:
          memento-repo: mandel-macaque/memento

      - name: Enforce memento note coverage
        uses: ./
        with:
          mode: gate
          strict: "true"
