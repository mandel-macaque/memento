name: release

on:
  workflow_run:
    workflows: [ci]
    types: [completed]

permissions:
  contents: write

jobs:
  metadata:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push'
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
          fetch-tags: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute release metadata
        id: meta
        shell: pwsh
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          ./scripts/release/compute-release-metadata.ps1 `
            -TargetSha "${{ github.event.workflow_run.head_sha }}" `
            -HeadBranch "${env:HEAD_BRANCH}" `
            -ProjectPath "src/GitMemento.Cli/GitMemento.Cli.fsproj"

  publish:
    needs: metadata
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: tar.gz
          - os: macos-15
            rid: osx-arm64
            archive: tar.gz
          - os: macos-15-intel
            rid: osx-x64
            archive: tar.gz
          - os: windows-latest
            rid: win-x64
            archive: zip

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.target_sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish NativeAOT
        run: dotnet publish src/GitMemento.Cli/GitMemento.Cli.fsproj -c Release -r ${{ matrix.rid }} -p:PublishAot=true --self-contained true -o out/${{ matrix.rid }}

      - name: Validate NativeAOT output
        shell: pwsh
        run: |
          ./scripts/release/validate-nativeaot-output.ps1 `
            -Rid "${{ matrix.rid }}" `
            -ArchiveType "${{ matrix.archive }}"

      - name: Package artifact
        shell: pwsh
        run: |
          ./scripts/release/package-artifact.ps1 `
            -Rid "${{ matrix.rid }}" `
            -ArchiveType "${{ matrix.archive }}"

      - name: Validate archive contents
        shell: pwsh
        run: |
          ./scripts/release/validate-archive-contents.ps1 `
            -Rid "${{ matrix.rid }}" `
            -ArchiveType "${{ matrix.archive }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifact-${{ matrix.rid }}
          path: |
            git-memento-${{ matrix.rid }}.tar.gz
            git-memento-${{ matrix.rid }}.zip
          if-no-files-found: ignore

  release:
    runs-on: ubuntu-latest
    needs: [metadata, publish]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifact-*
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.metadata.outputs.release_tag }}
          name: ${{ needs.metadata.outputs.release_name }}
          target_commitish: ${{ needs.metadata.outputs.target_sha }}
          generate_release_notes: false
          body: |
            Automated NativeAOT build for `${{ needs.metadata.outputs.target_sha }}`.
          fail_on_unmatched_files: true
          make_latest: true
          overwrite_files: true
          files: |
            git-memento-*.tar.gz
            git-memento-*.zip
