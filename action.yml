name: git-memento-note-comment
description: Post commit comments from git-memento notes, or enforce note coverage in CI.
author: git-memento contributors
branding:
  icon: message-square
  color: blue
inputs:
  mode:
    description: Action mode. Use "comment" to post commit comments, "gate" to enforce note coverage, or "merge-carry" to copy PR notes onto merge commits.
    required: false
    default: comment
  github-token:
    description: GitHub token used to read/write commit comments.
    required: false
    default: ${{ github.token }}
  notes-fetch-refspec:
    description: Refspec used to fetch git notes.
    required: false
    default: refs/notes/*:refs/notes/*
  audit-range:
    description: Explicit rev-list range for mode=gate. If empty, range is inferred from event context.
    required: false
    default: ""
  base-ref:
    description: Optional base branch name for pull_request range inference in mode=gate.
    required: false
    default: ""
  strict:
    description: Whether invalid note structure should fail mode=gate.
    required: false
    default: "true"
  ignore-label:
    description: Pull request label that bypasses gate note coverage checks.
    required: false
    default: "ignore-notes"
  max-comment-length:
    description: Maximum comment body length to emit.
    required: false
    default: "65000"
  carry-onto:
    description: Optional target commit for mode=merge-carry. Defaults to pull_request.merge_commit_sha.
    required: false
    default: ""
  carry-range:
    description: Optional explicit source range for mode=merge-carry (format <base>..<head>).
    required: false
    default: ""
  carry-base-sha:
    description: Optional base SHA for mode=merge-carry when carry-range is not provided.
    required: false
    default: ""
  carry-head-sha:
    description: Optional head SHA for mode=merge-carry when carry-range is not provided.
    required: false
    default: ""
  carry-provider:
    description: Provider name to set in local git config for mode=merge-carry.
    required: false
    default: "codex"
runs:
  using: composite
  steps:
    - name: Fetch git notes
      shell: bash
      run: git fetch origin '${{ inputs.notes-fetch-refspec }}' || true

    - name: Verify git-memento is installed for gate and merge-carry modes
      if: inputs.mode == 'gate' || inputs.mode == 'merge-carry'
      shell: bash
      run: |
        set -eu
        if ! command -v git-memento >/dev/null 2>&1; then
          echo "git-memento is required for mode '${{ inputs.mode }}' and was not found in PATH."
          echo "Install first with: uses: mandel-macaque/memento/install@v1"
          exit 2
        fi
        git memento --version

    - name: Detect gate ignore label
      if: inputs.mode == 'gate' && github.event_name == 'pull_request'
      id: gate_label_check
      shell: bash
      env:
        IGNORE_LABEL: ${{ inputs.ignore-label }}
      run: |
        set -eu
        ignored="$(node -e 'const fs=require("fs"); const payload=JSON.parse(fs.readFileSync(process.env.GITHUB_EVENT_PATH,"utf8")); const labels=(payload.pull_request?.labels||[]).map((l)=>l.name); process.stdout.write(labels.includes(process.env.IGNORE_LABEL) ? "true" : "false");')"
        echo "ignored=$ignored" >> "$GITHUB_OUTPUT"

    - name: Enforce git-memento note coverage
      if: inputs.mode == 'gate' && (github.event_name != 'pull_request' || steps.gate_label_check.outputs.ignored != 'true')
      shell: bash
      run: |
        set -eu
        RANGE="${{ inputs.audit-range }}"
        if [ -z "$RANGE" ]; then
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BASE="${{ inputs.base-ref }}"
            PR_HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            if [ -z "$BASE" ]; then
              BASE="${{ github.base_ref }}"
            fi
            if [ -z "$BASE" ]; then
              echo "Unable to infer base ref for pull_request event."
              exit 2
            fi
            if [ -z "$PR_HEAD_SHA" ]; then
              echo "Unable to infer PR head SHA for pull_request event."
              exit 2
            fi
            git fetch origin "$BASE"
            if ! git rev-parse --verify --quiet "${PR_HEAD_SHA}^{commit}" >/dev/null; then
              git fetch origin "$PR_HEAD_SHA"
            fi
            RANGE="origin/$BASE..$PR_HEAD_SHA"
          elif [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            if [ -n "$BEFORE" ] && ! printf '%s' "$BEFORE" | grep -Eq '^0+$'; then
              RANGE="$BEFORE..$AFTER"
            else
              RANGE="$AFTER"
            fi
          else
            RANGE="HEAD"
          fi
        fi

        echo "Running git memento audit on range: $RANGE"
        if [ "${{ inputs.strict }}" = "true" ]; then
          git memento audit --range "$RANGE" --strict --format text
        else
          git memento audit --range "$RANGE" --format text
        fi

    - name: Skip gate when ignore label is present
      if: inputs.mode == 'gate' && github.event_name == 'pull_request' && steps.gate_label_check.outputs.ignored == 'true'
      continue-on-error: true
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const marker = "<!-- git-memento-notes-ignored -->";
          const body = `${marker}\nNotes ignored`;
          const { owner, repo } = context.repo;
          const issue_number = context.payload.pull_request.number;

          const comments = await github.paginate(github.rest.issues.listComments, {
            owner,
            repo,
            issue_number,
            per_page: 100
          });
          const existing = comments.find((c) => c.user.type === "Bot" && c.body && c.body.includes(marker));

          try {
            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
            core.info(`Gate skipped because label '${core.getInput("ignore-label")}' is present.`);
          } catch (err) {
            core.warning(`Gate skip comment could not be written (continuing): ${err.message}`);
          }

    - name: Carry notes to merge commit
      if: inputs.mode == 'merge-carry'
      shell: bash
      run: |
        set -eu

        if [ "${GITHUB_EVENT_NAME}" != "pull_request" ]; then
          echo "mode=merge-carry is intended for pull_request events. Skipping."
          exit 0
        fi

        if [ "${{ github.event.action }}" != "closed" ] || [ "${{ github.event.pull_request.merged }}" != "true" ]; then
          echo "Pull request is not a merged close event. Skipping."
          exit 0
        fi

        PR_NUMBER="${{ github.event.pull_request.number }}"
        ONTO_COMMIT="${{ inputs.carry-onto }}"
        BASE_SHA="${{ inputs.carry-base-sha }}"
        HEAD_SHA="${{ inputs.carry-head-sha }}"
        RANGE="${{ inputs.carry-range }}"

        if [ -z "$ONTO_COMMIT" ]; then
          ONTO_COMMIT="${{ github.event.pull_request.merge_commit_sha }}"
        fi

        if [ -z "$ONTO_COMMIT" ]; then
          echo "Unable to resolve merge target commit. Set carry-onto explicitly for mode=merge-carry."
          exit 2
        fi

        git fetch origin "$ONTO_COMMIT"
        if [ -z "$HEAD_SHA" ]; then
          git fetch origin "refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr/${PR_NUMBER}/head"
          HEAD_SHA="$(git rev-parse "refs/remotes/origin/pr/${PR_NUMBER}/head")"
        fi

        if [ -z "$BASE_SHA" ]; then
          if git rev-parse --verify --quiet "${ONTO_COMMIT}^1" >/dev/null; then
            ONTO_PARENT_SHA="$(git rev-parse "${ONTO_COMMIT}^1")"
            BASE_SHA="$(git merge-base "$ONTO_PARENT_SHA" "$HEAD_SHA")"
          else
            BASE_SHA="$(git merge-base "$ONTO_COMMIT" "$HEAD_SHA")"
          fi
        fi

        if [ -z "$RANGE" ]; then
          RANGE="${BASE_SHA}..${HEAD_SHA}"
        fi

        if [ -z "$RANGE" ]; then
          echo "Unable to resolve merge-carry parameters. onto='${ONTO_COMMIT}' range='${RANGE}'"
          exit 2
        fi

        DEFAULT_ALREADY_CARRIED="false"
        if git notes show "$ONTO_COMMIT" 2>/dev/null | grep -Fq -- "- Source range: ${RANGE}"; then
          DEFAULT_ALREADY_CARRIED="true"
        fi

        AUDIT_ALREADY_CARRIED="false"
        if git notes --ref refs/notes/memento-full-audit show "$ONTO_COMMIT" 2>/dev/null | grep -Fq -- "- Source range: ${RANGE}"; then
          AUDIT_ALREADY_CARRIED="true"
        fi

        if [ "$DEFAULT_ALREADY_CARRIED" = "true" ] && [ "$AUDIT_ALREADY_CARRIED" = "true" ]; then
          echo "Default and full-audit notes already include carried range '${RANGE}' on ${ONTO_COMMIT}. Skipping."
          exit 0
        fi

        git config --local memento.provider "${{ inputs.carry-provider }}"
        git memento notes-carry --onto "$ONTO_COMMIT" --from-range "$RANGE"
        git push origin 'refs/notes/*'

    - name: Install note renderer dependencies
      if: inputs.mode == 'comment'
      shell: bash
      run: npm --prefix "$GITHUB_ACTION_PATH" ci --omit=dev

    - name: Create or update commit comments from memento notes
      if: inputs.mode == 'comment'
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const { execSync } = require("child_process");
          const path = require("path");
          const renderer = require(path.join(process.env.GITHUB_ACTION_PATH || process.cwd(), "dist", "note-comment-renderer.js"));
          const { marker, buildBody, buildNoSessionBody } = renderer;
          const maxBodyLength = Number.parseInt(core.getInput("max-comment-length"), 10) || 65000;
          const { owner, repo } = context.repo;

          const isSha = (value) => /^[0-9a-f]{40}$/i.test(value || "");

          const getCommitShas = async () => {
            if (context.eventName === "push") {
              const before = context.payload.before;
              const after = context.payload.after;

              if (isSha(before) && isSha(after) && !/^0+$/.test(before)) {
                const output = execSync(`git rev-list ${before}..${after}`, { encoding: "utf8" }).trim();
                return output ? output.split("\n").filter(isSha) : [after];
              }

              return isSha(after) ? [after] : [];
            }

            if (context.eventName === "pull_request") {
              const prNumber = context.payload.pull_request.number;
              const commits = await github.paginate(github.rest.pulls.listCommits, {
                owner,
                repo,
                pull_number: prNumber,
                per_page: 100
              });

              return commits.map((c) => c.sha).filter(isSha);
            }

            return [];
          };

          const shas = [...new Set(await getCommitShas())];

          for (const sha of shas) {
            const existingComments = await github.paginate(github.rest.repos.listCommentsForCommit, {
              owner,
              repo,
              commit_sha: sha,
              per_page: 100
            });

            const existing = existingComments.find((c) => c.body && c.body.includes(marker));

            let note;
            try {
              note = execSync(`git notes show ${sha}`, { encoding: "utf8", stdio: ["ignore", "pipe", "ignore"] }).trim();
            } catch {
              core.info(`No git note found for ${sha}; posting fallback comment.`);
              note = "";
            }

            const body = note ? buildBody(note, maxBodyLength) : buildNoSessionBody();

            if (existing) {
              await github.rest.repos.updateCommitComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated memento note comment on commit ${sha}.`);
            } else {
              await github.rest.repos.createCommitComment({
                owner,
                repo,
                commit_sha: sha,
                body
              });
              core.info(`Created memento note comment on commit ${sha}.`);
            }
          }
